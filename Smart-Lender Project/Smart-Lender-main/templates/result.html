<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Prediction Result</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        🏦 Smart Lender
    </div>

</header>

<div class="result-card">

{% if "Approved" in prediction %}

<div style="font-size:90px;">✅</div>

<h1 style="color:#16a34a;">
Loan Approved
</h1>

<p style="font-size:20px;color:#555;margin-top:15px;">
Congratulations! Your loan application has been approved.
</p>

{% else %}

<div style="font-size:90px;">❌</div>

<h1 style="color:#dc2626;">
Loan Rejected
</h1>

<p style="font-size:20px;color:#555;margin-top:15px;">
Sorry! Your application could not be approved based on the provided details.
</p>

{% endif %}

<br>

<a href="/" class="back-btn">

Apply Again

</a>

</div>

<footer>

🔒 Smart Lender AI Prediction System

</footer>

</body>

</html>
